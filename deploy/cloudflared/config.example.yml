# Exemplo de configuracao do Cloudflare Tunnel (modo local).
# Recomendado em 2026: criar o tunnel pelo dashboard Zero Trust (modo gerenciado),
# mas este arquivo serve se voce preferir gerenciar localmente.
#
# Passos:
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create boardzando   (gera o <UUID>.json em ~/.cloudflared)
#   3. cloudflared tunnel route dns boardzando jogos.seudominio.com
#   4. cloudflared tunnel --config deploy/cloudflared/config.yml run
#
# WebSocket/WSS funciona sem config extra: o TLS termina na borda da Cloudflare.
# IMPORTANTE: a Cloudflare encerra WS ociosos e pode reiniciar servidores ao
# liberar codigo novo -> o heartbeat do socket.io e a reconexao sao obrigatorios.

tunnel: boardzando
credentials-file: /root/.cloudflared/SEU-UUID-AQUI.json

ingress:
  - hostname: jogos.seudominio.com
    service: http://localhost:3000        # NestJS (REST + Socket.IO no mesmo host)
    originRequest:
      connectTimeout: 30s
      noTLSVerify: false
  # regra catch-all OBRIGATORIA, senao o cloudflared nao inicia
  - service: http_status:404
